# ============================================================
#  Render Blueprint — نشر تلقائي على الاستضافة المجانية
#  ضع هذا الملف في جذر المستودع، واربط المستودع بـ Render
#  ثم أدخل بيانات قاعدة البيانات (Aiven) في متغيّرات البيئة.
# ============================================================
services:
  - type: web
    name: khudh-biyadi
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # تهيئة الجداول تلقائياً عند أول تشغيل
      - key: AUTO_INIT
        value: "true"
      - key: AUTO_SEED
        value: "true"
      # إعدادات قاعدة بيانات سحابية (Aiven): قاعدة جاهزة + SSL
      - key: DB_CREATE
        value: "false"
      - key: DB_SSL
        value: "true"
      # سرّ JWT يولّده Render عشوائياً (آمن)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      # أدخل هذه القيم يدوياً من لوحة Render (من بيانات Aiven)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      # بريد أولي (اختياري — اتركه فارغاً ليُسجّل في السجل بدل الإرسال)
      - key: SEED_COORDINATOR_PASSWORD
        sync: false
      # ===== الإشعارات البريدية (Gmail SMTP) =====
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: beyadikw@gmail.com
      # كلمة مرور التطبيقات (App Password) المكوّنة من 16 حرفاً — أدخلها يدوياً في Render
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: "مشروع خذ بيدي <beyadikw@gmail.com>"
      # البريد الذي تصله إشعارات الطلبات الجديدة
      - key: ADMIN_NOTIFY_EMAIL
        value: beyadikw@gmail.com
