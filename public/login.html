<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>تسجيل الدخول · خذ بيدي</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2A2520" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="خذ بيدي" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: var(--font-sans); background: #FAF8F2; min-height:100vh; display:grid; place-items:center; color:#2A2520; }
  .card { background:#fff; border:1px solid #EADFC4; border-radius:20px; padding:34px; width:380px; max-width:92vw; box-shadow:0 24px 60px rgba(42,37,32,.10); }
  .logo { display:block; height:74px; margin:0 auto 18px; }
  h1 { font-size:19px; text-align:center; margin:0 0 4px; }
  p.sub { text-align:center; color:#7a7268; font-size:13px; margin:0 0 22px; }
  label { display:block; font-size:13px; font-weight:600; margin:14px 0 7px; }
  input { width:100%; padding:12px 14px; border:1px solid #d8d2c4; border-radius:12px; font-size:14px; font-family:inherit; outline:none; }
  input:focus { border-color:#B8924A; box-shadow:0 0 0 3px #F4ECD9; }
  button { width:100%; margin-top:22px; padding:13px; border:none; border-radius:12px; background:#B8924A; color:#fff; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  button:hover { background:#997633; }
  button:disabled { opacity:.6; cursor:default; }
  .err { background:#FCEDEB; color:#CA483A; font-size:13px; padding:10px 13px; border-radius:10px; margin-top:16px; display:none; }
  .hint { margin-top:18px; text-align:center; font-size:12px; color:#9a9388; line-height:1.6; }
</style>
</head>
<body>
  <form class="card" id="form">
    <img class="logo" src="logo.png" alt="خذ بيدي" onerror="this.style.display='none'" />
    <h1>بوابة طلبات رعاية الفعاليات</h1>
    <p class="sub">مشروع خذ بيدي — دخول فريق المشروع</p>
    <label for="email">البريد الإلكتروني</label>
    <input id="email" type="email" autocomplete="username" value="coordinator@beyadik.kw" />
    <label for="password">كلمة المرور</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button id="btn" type="submit">تسجيل الدخول</button>
    <div class="err" id="err"></div>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f0ead9;text-align:center">
      <div style="font-size:12px;color:#9a9388;margin-bottom:8px">جهة تريد طلب رعاية فعالية؟</div>
      <a href="submit.html" style="display:inline-block;padding:10px 18px;border:1px solid #B8924A;color:#997633;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600">تقديم طلب رعاية ←</a>
    </div>
  </form>

  <script src="logo-data.js"></script>
  <script>
    // استخدم الشعار المضمّن إن توفّر
    const img = document.querySelector('.logo');
    if (window.BK_LOGO) img.src = window.BK_LOGO;
  </script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (API.isAuthed()) location.href = 'index.html';
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'جارٍ الدخول…';
      try {
        await API.login(document.getElementById('email').value.trim(), document.getElementById('password').value);
        location.href = 'index.html';
      } catch (ex) {
        err.textContent = ex.message; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
