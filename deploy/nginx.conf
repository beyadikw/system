# ============================================================
#  nginx — بديل لـ Caddy (HTTPS عبر certbot/Let's Encrypt)
#  1) ضع الكتلة في /etc/nginx/sites-available/beyadik
#  2) fe' الرابط الرمزي إلى sites-enabled وأعد تحميل nginx
#  3) أصدر الشهادة:  sudo certbot --nginx -d beyadik.kw -d www.beyadik.kw
# ============================================================

server {
    listen 80;
    server_name beyadik.kw www.beyadik.kw;
    # certbot يحوّل هذا تلقائياً إلى redirect على https بعد إصدار الشهادة
    location / { proxy_pass http://127.0.0.1:4000; }
}

server {
    listen 443 ssl http2;
    server_name beyadik.kw www.beyadik.kw;

    # مسارات الشهادة (يضبطها certbot تلقائياً)
    # ssl_certificate     /etc/letsencrypt/live/beyadik.kw/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/beyadik.kw/privkey.pem;

    client_max_body_size 20M;            # ليسمح برفع الملفات والصور

    # ترويسات أمان
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
